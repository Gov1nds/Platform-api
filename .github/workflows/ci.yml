name: Platform API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pgi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/pgi_test
      ENVIRONMENT: test
      SECRET_KEY: ci-test-secret
      ALLOW_CREATE_ALL: "true"
      ANALYZER_READINESS_REQUIRED: "false"
      ENABLE_RUNTIME_BOOTSTRAP: "false"
      OBJECT_STORAGE_PROVIDER: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Verify app boots
        run: |
          timeout 10 python -c "
          from app.main import app
          from app.core.database import check_db_connection
          check_db_connection()
          print('Boot OK')
          " || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile app/main.py && echo "Syntax OK"
